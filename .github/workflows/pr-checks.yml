name: pr-checks
on:
    pull_request:
        branches:
            - main

jobs:
    pr-checks:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js
              id: cache-npm
              uses: actions/setup-node@v6
              with:
                  node-version: '24.x'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json
            - name: Install npm dependencies
              run: npm ci --ignore-scripts
            - name: Run tests
              if: always()
              run: npm test
            - name: Lint
              if: always()
              run: npm run lint:ci
            - name: Check formatting
              if: always()
              run: npm run prettier:check
            - name: Audit dependencies
              if: always()
              run: npm audit
            - name: Run build
              if: always()
              run: 'npm run build'
